        selector:
          number: { min: 50, max: 2000, mode: box, unit_of_measurement: "ms" }

      on_hold_max_seconds:
        name: "Maintien â€” durÃ©e max (s)"
        description: "SÃ©curitÃ©: stoppe la rÃ©pÃ©tition au bout de X secondes mÃªme si l'Ã©vÃ©nement relÃ¢chement n'est pas dÃ©tectÃ©."
        default: 25
        selector:
          number: { min: 5, max: 120, mode: box, unit_of_measurement: "s" }

###############################################################################
# TRIGGERS
#
# - Boutons: on dÃ©clenche sur changement d'Ã©tat de l'entitÃ© event du canal.
# - Molette relaxed: dÃ©clenche sur event molette.
# - Molette instant: dÃ©clenche sur sensor diagnostique (si fourni).
###############################################################################
trigger:
  # Bouton canal 1/2/3
  - platform: state
    entity_id: !input btn_event_ch1
    id: btn_ch1
  - platform: state
    entity_id: !input btn_event_ch2
    id: btn_ch2
  - platform: state
    entity_id: !input btn_event_ch3
    id: btn_ch3

  # Molette relaxed (event)
  - platform: state
    entity_id: !input scroll_event_ch1
    id: wheel_event_ch1
  - platform: state
    entity_id: !input scroll_event_ch2
    id: wheel_event_ch2
  - platform: state
    entity_id: !input scroll_event_ch3
    id: wheel_event_ch3

  # Molette instant (sensor diagnostique) â€” triggers optionnels
  - platform: state
    entity_id: !input scroll_sensor_ch1
    id: wheel_sensor_ch1
  - platform: state
    entity_id: !input scroll_sensor_ch2
    id: wheel_sensor_ch2
  - platform: state
    entity_id: !input scroll_sensor_ch3
    id: wheel_sensor_ch3

###############################################################################
# VARIABLES: normalisation des entrÃ©es par canal + utilitaires
###############################################################################
